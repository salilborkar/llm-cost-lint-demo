name: LLM Cost Lint
on: [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  cost-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: salilborkar/llm-cost-lint@v1
        with:
          path: "."
          monthly-calls: 50000
          cost-threshold: 500
